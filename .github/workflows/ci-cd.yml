name: MLOps Automation CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test_and_train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out Repository
        uses: actions/checkout@v4

      - name: Set up Astral uv
        uses: astral-sh/setup-uv@v3
        with:
          # Automatically cache uv package installations across runs
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Synchronize Project Virtual Environment
        run: uv sync --all-groups

      - name: Execute Automated Data Acquisition Pipeline
        run: uv run src/download_data.py

      - name: Execute Model Training Pipeline (With MLflow Tracking)
        run: uv run src/train.py

      - name: Execute Automated Test Suite (Pytest Verification)
        run: uv run pytest
